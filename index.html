<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Netflix (NFLX) — Long-Only Pitch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --navy-darkest: #00294b;
    --navy-dark:    #003a66;
    --navy:         #005f9e;
    --navy-light:   #0075b5;
    --teal:         #007e6c;
    --teal-light:   #75d9d7;
    --magenta:      #a6256e;
    --warm:         #ebe0da;
    --warm-deep:    #d9c5ba;
    --bg-light-blue:#def5ff;
    --bg-light-teal:#ddf6f6;
    --bg-light-pink:#fbedf5;
    --gray-50:      #fafafa;
    --gray-100:     #f1f1f1;
    --gray-200:     #e2e2e2;
    --gray-300:     #c8cdd2;
    --gray-500:     #6b7f8a;
    --gray-700:     #3d4a55;
    --ink:          #00294b;
    --font-display: "Source Serif 4", Georgia, "Times New Roman", serif;
    --font-body:    "Inter", -apple-system, BlinkMacSystemFont, "Avenir Next", Avenir, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: var(--font-body);
    color: var(--ink);
    background: var(--gray-100);
    overflow: hidden;
  }
  body { line-height: 1.45; }

  .deck { position: relative; height: 100vh; width: 100vw; overflow: hidden; }
  .slide {
    position: absolute;
    inset: 0;
    background: #fff;
    padding: 56px 80px 80px 80px;
    display: flex;
    flex-direction: column;
    opacity: 0;
    transform: translateX(40px);
    transition: opacity .35s ease, transform .35s ease;
    pointer-events: none;
    overflow: auto;
  }
  .slide.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
  .slide-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--gray-200);
  }
  .eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.6px;
    color: var(--navy);
    font-weight: 600;
  }
  .slide h1 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 38px;
    color: var(--navy-darkest);
    letter-spacing: -0.01em;
    line-height: 1.15;
  }
  .slide h2 {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 24px;
    color: var(--navy-dark);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .slide h3 {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-700);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .ticker-tag {
    background: var(--navy-darkest);
    color: white;
    padding: 4px 10px;
    border-radius: 3px;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 1.5px;
  }

  /* ===== Cover ===== */
  .cover {
    background: linear-gradient(135deg, var(--navy-darkest) 0%, var(--navy-dark) 50%, var(--navy) 100%);
    color: #fff;
    padding: 100px 100px;
    justify-content: center;
  }
  .cover .brand-mark {
    font-family: var(--font-display);
    font-size: 16px;
    letter-spacing: 0.5px;
    opacity: 0.7;
    margin-bottom: 50px;
  }
  .cover .ticker {
    font-family: var(--font-body);
    font-size: 14px;
    letter-spacing: 2.5px;
    font-weight: 600;
    color: var(--teal-light);
    margin-bottom: 20px;
  }
  .cover h1 {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 600;
    line-height: 1.05;
    color: #fff;
    max-width: 900px;
    letter-spacing: -0.02em;
    margin-bottom: 28px;
  }
  .cover .subline {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 22px;
    color: var(--teal-light);
    max-width: 700px;
    line-height: 1.35;
  }
  .cover .footer-meta {
    position: absolute;
    bottom: 60px;
    left: 100px;
    right: 100px;
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border-top: 1px solid rgba(255,255,255,0.18);
    padding-top: 18px;
  }

  /* ===== Summary one-pager ===== */
  .summary-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr;
    gap: 32px;
    flex: 1;
    min-height: 0;
  }
  .summary-thesis { display: flex; flex-direction: column; gap: 18px; }
  .thesis-pull {
    font-family: var(--font-display);
    font-size: 24px;
    font-style: italic;
    color: var(--navy-dark);
    line-height: 1.35;
    padding: 20px 0 22px 22px;
    border-left: 3px solid var(--teal);
  }
  .pillars { display: grid; grid-template-columns: repeat(2,1fr); gap: 14px; }
  .pillar {
    background: var(--bg-light-blue);
    padding: 16px 18px;
    border-radius: 4px;
  }
  .pillar .pillar-num {
    color: var(--navy);
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .pillar h4 {
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 600;
    color: var(--navy-darkest);
    margin: 4px 0 6px;
  }
  .pillar p { font-size: 13.5px; color: var(--gray-700); line-height: 1.5; }

  /* Right-rail metrics card */
  .metrics-card {
    background: var(--gray-50);
    border: 1px solid var(--gray-200);
    border-radius: 6px;
    padding: 22px 24px;
  }
  .metrics-card h3 { color: var(--navy); margin-bottom: 14px; }
  .metric-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px dotted var(--gray-200);
    font-size: 13px;
  }
  .metric-row:last-child { border: none; }
  .metric-row .lbl { color: var(--gray-500); }
  .metric-row .val { color: var(--navy-darkest); font-weight: 600; font-variant-numeric: tabular-nums; }
  .metric-row .val.pos { color: var(--teal); }
  .metric-row .val.neg { color: var(--magenta); }

  .reco-box {
    margin-top: 18px;
    background: var(--navy-darkest);
    color: white;
    padding: 22px 24px;
    border-radius: 6px;
  }
  .reco-box .reco-label { font-size: 11px; letter-spacing: 2px; opacity: 0.7; text-transform: uppercase; }
  .reco-box .reco-action {
    font-family: var(--font-display);
    font-size: 36px;
    font-weight: 600;
    line-height: 1.1;
    margin: 6px 0 4px;
  }
  .reco-box .reco-meta { font-size: 13px; color: var(--teal-light); }

  /* ===== Generic two-column ===== */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 36px;
    flex: 1;
    min-height: 0;
  }
  .col { display: flex; flex-direction: column; gap: 14px; min-height: 0; }
  .chart-wrap { flex: 1; min-height: 0; position: relative; }
  .chart-wrap canvas { width: 100% !important; height: 100% !important; }

  .body-copy {
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--gray-700);
    margin: 8px 0;
  }
  .body-copy strong { color: var(--navy-darkest); }
  ul.bullets { list-style: none; padding: 0; }
  ul.bullets li {
    position: relative;
    padding-left: 20px;
    margin: 14px 0;
    font-size: 16px;
    color: var(--gray-700);
    line-height: 1.55;
  }
  ul.bullets li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 9px;
    width: 8px;
    height: 8px;
    background: var(--teal);
  }
  ul.bullets li strong { color: var(--navy-darkest); }

  /* Number callouts */
  .callout-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin: 8px 0 20px;
  }
  .callout {
    background: var(--bg-light-teal);
    padding: 16px 18px;
    border-radius: 4px;
    border-left: 3px solid var(--teal);
  }
  .callout .co-val {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 600;
    color: var(--navy-darkest);
    line-height: 1;
  }
  .callout .co-lbl {
    font-size: 11px;
    letter-spacing: 1.3px;
    text-transform: uppercase;
    color: var(--gray-500);
    margin-top: 6px;
  }

  /* Tables */
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 12.5px;
    font-variant-numeric: tabular-nums;
  }
  table.data th, table.data td {
    padding: 8px 10px;
    text-align: right;
    border-bottom: 1px solid var(--gray-200);
  }
  table.data th {
    background: var(--navy-darkest);
    color: white;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-size: 10.5px;
    text-align: right;
  }
  table.data td:first-child, table.data th:first-child { text-align: left; }
  table.data tr.highlight td { background: var(--bg-light-blue); font-weight: 600; color: var(--navy-darkest); }

  /* Sensitivity heatmap */
  .heatmap {
    width: 100%;
    border-collapse: separate;
    border-spacing: 4px;
  }
  .heatmap td {
    padding: 14px 10px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    border-radius: 3px;
    font-size: 13px;
  }
  .heatmap th {
    padding: 6px;
    font-size: 11px;
    color: var(--gray-500);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* Footer/page numbers */
  .slide-footer {
    position: absolute;
    bottom: 24px;
    left: 80px;
    right: 80px;
    display: flex;
    justify-content: space-between;
    font-size: 10.5px;
    color: var(--gray-500);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    padding-top: 12px;
    border-top: 1px solid var(--gray-100);
  }

  /* Nav controls */
  .nav-controls {
    position: fixed;
    bottom: 16px;
    right: 16px;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.95);
    border: 1px solid var(--gray-200);
    padding: 6px 10px;
    border-radius: 30px;
    box-shadow: 0 4px 12px rgba(0,41,75,0.10);
    font-size: 12px;
  }
  .nav-controls button {
    background: transparent;
    border: none;
    color: var(--navy);
    font-size: 16px;
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
  }
  .nav-controls button:hover { color: var(--navy-darkest); }
  .nav-controls .counter { color: var(--gray-500); font-weight: 500; font-variant-numeric: tabular-nums; }

  .footnote {
    font-size: 10.5px;
    color: var(--gray-500);
    font-style: italic;
    margin-top: 10px;
    line-height: 1.45;
  }

  /* Risks/wrong slide */
  .risk-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    flex: 1;
    align-content: start;
  }
  .risk-card {
    border: 1px solid var(--gray-200);
    padding: 18px 20px;
    border-radius: 6px;
    background: var(--gray-50);
  }
  .risk-card .risk-label {
    color: var(--magenta);
    font-size: 11px;
    letter-spacing: 1.5px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .risk-card h4 {
    font-family: var(--font-display);
    font-size: 19px;
    color: var(--navy-darkest);
    margin: 6px 0 8px;
  }
  .risk-card p { font-size: 14.5px; line-height: 1.55; color: var(--gray-700); }
  .risk-card .signpost {
    margin-top: 10px;
    font-size: 12px;
    color: var(--navy);
    border-top: 1px dotted var(--gray-300);
    padding-top: 8px;
  }

  /* Generic two-row top, chart bottom */
  .row-then-chart { display: flex; flex-direction: column; gap: 16px; flex: 1; min-height: 0; }
  .row-then-chart .chart-wrap { flex: 1; }

  /* Football field */
  .football {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding-top: 8px;
  }
  .ff-row {
    display: grid;
    grid-template-columns: 200px 1fr 100px;
    align-items: center;
    gap: 12px;
    padding: 4px 0;
    font-size: 13px;
  }
  .ff-bar-track {
    height: 28px;
    position: relative;
    background: var(--gray-100);
    border-radius: 3px;
  }
  .ff-bar {
    position: absolute;
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--navy-light));
    border-radius: 3px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    color: white;
    font-size: 11px;
    font-weight: 600;
  }
  .ff-bar.deal { background: linear-gradient(90deg, var(--teal), var(--teal-light)); color: var(--navy-darkest); }
  .ff-bar.bear { background: linear-gradient(90deg, var(--magenta), #d678a8); }
  .ff-curprice {
    position: absolute;
    top: -4px;
    bottom: -4px;
    width: 2px;
    background: var(--navy-darkest);
    z-index: 5;
  }
  .ff-curprice::after {
    content: attr(data-label);
    position: absolute;
    top: -16px;
    left: 6px;
    font-size: 10px;
    font-weight: 700;
    color: var(--navy-darkest);
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .ff-label { font-weight: 500; color: var(--navy-darkest); font-size: 13px; }
  .ff-px { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--gray-700); text-align: right; }
</style>
</head>
<body>
<div class="deck" id="deck"></div>
<div class="nav-controls">
  <button id="prev">‹</button>
  <span class="counter"><span id="cur">1</span> / <span id="total">14</span></span>
  <button id="next">›</button>
</div>

<script>
const fmt$B = (x) => '$' + (x/1e9).toFixed(1) + 'B';
const fmt$M = (x) => '$' + (x/1e6).toFixed(0) + 'M';
const fmtPct = (x, d=1) => (x*100).toFixed(d) + '%';
const fmt$ = (x) => '$' + x.toFixed(0);

// CapGroup palette as JS constants
const C = {
  navyDarkest: '#00294b',
  navyDark: '#003a66',
  navy: '#005f9e',
  navyLight: '#0075b5',
  teal: '#007e6c',
  tealLight: '#75d9d7',
  magenta: '#a6256e',
  warm: '#d9c5ba',
  gray500: '#6b7f8a',
  gray200: '#e2e2e2',
};

// Chart.js defaults — Jackson's rules: no black ink, straight lines, visible dots
Chart.defaults.font.family = '"Inter", -apple-system, sans-serif';
Chart.defaults.font.size = 11;
Chart.defaults.color = C.navyDarkest;
Chart.defaults.borderColor = C.gray200;
Chart.defaults.elements.line.tension = 0;
Chart.defaults.elements.point.radius = 4;
Chart.defaults.elements.point.hoverRadius = 6;
Chart.defaults.plugins.legend.labels.boxWidth = 12;
Chart.defaults.plugins.legend.labels.padding = 14;

let D = null;  // loaded deck data

async function load() {
  const r = await fetch('data/deck_data.json');
  D = await r.json();
  renderAll();
  return D;
}

function renderAll() {
  const deck = document.getElementById('deck');
  deck.innerHTML = '';
  SLIDES.forEach((fn, i) => {
    const s = document.createElement('div');
    // Slide 0 is the cover — give it the cover background directly so the
    // function body can return cover content without nesting another .slide
    s.className = 'slide' + (i === 0 ? ' active cover' : (i === 0 ? ' cover' : ''));
    if (i === 0) s.className = 'slide active cover';
    s.id = 'slide-' + i;
    s.innerHTML = fn(i);
    deck.appendChild(s);
  });
  document.getElementById('total').textContent = SLIDES.length;
  SLIDES.forEach((_, i) => { if (CHART_INIT[i]) CHART_INIT[i](i); });
}

const CHART_INIT = {};

function slideFooter(i) {
  return `<div class="slide-footer"><span>NETFLIX (NFLX) — INVESTMENT MEMO</span><span>${(i+1).toString().padStart(2,'0')} / ${SLIDES.length.toString().padStart(2,'0')}</span></div>`;
}

function slideHeader(eyebrow, title) {
  return `<div class="slide-header">
    <div>
      <div class="eyebrow">${eyebrow}</div>
      <h1>${title}</h1>
    </div>
    <span class="ticker-tag">NFLX · NASDAQ</span>
  </div>`;
}

// ============================ SLIDES =================================
const SLIDES = [
  // 0 — Cover (rendered directly inside the outer .slide; no nested .slide)
  (i) => `
    <div class="brand-mark">CAPITAL GROUP — EQUITY RESEARCH</div>
    <div class="ticker">NFLX · NASDAQ · LARGE CAP CORE GROWTH</div>
    <h1>Netflix: the only streamer with the scale to underwrite WBD — and the only one who doesn't need to.</h1>
    <div class="subline">A long-only investment memo on the dominant distributor in global streaming.</div>
    <div class="footer-meta">
      <span>Investment memo · May 2026</span>
      <span>Prepared for portfolio review</span>
    </div>`,

  // 1 — Investment Summary one-pager
  (i) => `
  ${slideHeader('Investment summary', 'A platform that compounds at scale')}
  <div class="summary-grid">
    <div class="summary-thesis">
      <div class="thesis-pull">"Internet distribution is more scalable than content." With 325M paid memberships and ~1B global viewers, Netflix has locked the distribution channel — and operating leverage is doing the rest.</div>
      <div class="pillars">
        <div class="pillar"><div class="pillar-num">01</div><h4>Dominant distribution moat</h4><p>~90% of profits among scaled streamers. ARPU pricing power proven (~+10% in U.S.). Lowest churn in the category.</p></div>
        <div class="pillar"><div class="pillar-num">02</div><h4>Compounding operating leverage</h4><p>Content costs fell from 63% → 52% of revenue and marketing from 15% → 7% since 2018. EBIT margin tripled to 29.5%.</p></div>
        <div class="pillar"><div class="pillar-num">03</div><h4>Optionality on WBD</h4><p>If walked away — buybacks restart. If acquired at Paramount-match terms — a $91B content library at ~10–11× incremental EBIT after a 10% bundle price uplift.</p></div>
        <div class="pillar"><div class="pillar-num">04</div><h4>Underwriting at current price</h4><p>At ~22.6× FY26 EV/EBIT, the market is paying for dominance but not for the WBD optionality and not for the ad-tier doubling.</p></div>
      </div>
      <p class="footnote">Sources: NFLX 10-K (FY18–FY25, SEC EDGAR); FY26 management guidance (Jan 2026 shareholder letter); consensus peer multiples (mid-May 2026 rollup).</p>
    </div>
    <div>
      <div class="metrics-card">
        <h3>At-a-glance</h3>
        <div class="metric-row"><span class="lbl">Price (May 2026)</span><span class="val" id="m-price">—</span></div>
        <div class="metric-row"><span class="lbl">Shares outstanding</span><span class="val" id="m-shares">—</span></div>
        <div class="metric-row"><span class="lbl">Market cap</span><span class="val" id="m-mcap">—</span></div>
        <div class="metric-row"><span class="lbl">Net debt</span><span class="val" id="m-netdebt">—</span></div>
        <div class="metric-row"><span class="lbl">FY25A revenue</span><span class="val" id="m-fy25rev">—</span></div>
        <div class="metric-row"><span class="lbl">FY25A EBIT</span><span class="val" id="m-fy25ebit">—</span></div>
        <div class="metric-row"><span class="lbl">FY25A EBIT margin</span><span class="val pos" id="m-fy25mgn">—</span></div>
        <div class="metric-row"><span class="lbl">FY26E EBIT (our base)</span><span class="val" id="m-fy26ebit">—</span></div>
        <div class="metric-row"><span class="lbl">FY26E EV / EBIT</span><span class="val" id="m-fy26evebit">—</span></div>
      </div>
      <div class="reco-box">
        <div class="reco-label">Recommendation</div>
        <div class="reco-action">BUY</div>
        <div class="reco-meta" id="m-reco-meta">—</div>
      </div>
    </div>
  </div>
  ${slideFooter(i)}`,

  // 2 — Football field / scenario IRRs
  (i) => `
  ${slideHeader('Valuation', '4-year scenario ladder: where the price target lands')}
  <p class="body-copy" style="margin-bottom:10px;">Five-year EBIT × 17× forward exit multiple − net debt + interim FCF. Targets discounted at IRR back from FY30. Even the bear-case (WBD overpay + integration drag) clears the current price.</p>
  <div class="football" id="football"></div>
  <p class="footnote">Method: project FY26E–FY30E revenue and EBIT under each scenario, apply 17× exit EV/EBIT to FY30 EBIT, credit FY26–FY28 free cash (80% conversion), subtract net debt including incremental WBD financing. Discount to current.</p>
  ${slideFooter(i)}`,

  // 3 — Business: what NFLX actually is
  (i) => `
  ${slideHeader('Business', 'What Netflix actually is — a distribution platform that owns content economics')}
  <div class="two-col">
    <div class="col">
      <h2>The business in one paragraph</h2>

    const pctWidth = ((high - low) / (max - min)) * 100;

    const row = document.createElement('div');
    row.className = 'ff-row';

CHART_INIT[11] = () => {
  // Sensitivity heatmap
  const t = document.getElementById('sens-table');
  if (!t) return;
  const s = D.sensitivity;
  // Build table
  let html = '<tr><th></th>';
  s.multiples.forEach(m => html += `<th>${m}× EV/EBIT</th>`);
  html += '</tr>';
  s.grid.forEach((row) => {
    html += `<tr><th>${(row.margin*100).toFixed(0)}% margin</th>`;
    row.row.forEach((cell) => {
      const irr = cell.irr * 100;
      // color scale
      const r = irr < 0 ? 166 : Math.max(0, 95 - irr*2.5);
      const g = irr < 0 ? 37 : Math.min(180, 100 + irr*2);
      const b = irr < 0 ? 110 : Math.min(200, 110 + irr);
      const bg = `rgb(${r},${g},${b})`;
      const txt = irr < 0 ? '#fff' : (irr < 8 ? '#fff' : '#fff');
      html += `<td style="background:${bg}; color:${txt}; font-weight:600;">${irr.toFixed(1)}%</td>`;
    });
    html += '</tr>';
  });
  t.innerHTML = html;
};

// ============================ NAV ============================
let cur = 0;
function show(idx) {
  cur = Math.max(0, Math.min(SLIDES.length - 1, idx));
  document.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === cur));
  document.getElementById('cur').textContent = cur + 1;
  // keep cover styling on slide 0 even if it lost the class somehow
  const s0 = document.getElementById('slide-0');
  if (s0 && cur === 0) s0.classList.add('cover');
  history.replaceState(null, '', '#' + cur);
}
// jump to slide from URL hash if present
function jumpFromHash() {
  const h = parseInt((location.hash || '').slice(1), 10);
  if (!isNaN(h) && h >= 0 && h < SLIDES.length) show(h);
}
document.getElementById('next').addEventListener('click', () => show(cur+1));
document.getElementById('prev').addEventListener('click', () => show(cur-1));
document.addEventListener('keydown', (e) => {
  if (['ArrowRight','PageDown',' '].includes(e.key)) { e.preventDefault(); show(cur+1); }
  if (['ArrowLeft','PageUp'].includes(e.key))       { e.preventDefault(); show(cur-1); }
  if (e.key === 'Home') show(0);
  if (e.key === 'End')  show(SLIDES.length-1);
});

load().then(() => jumpFromHash());
window.addEventListener('hashchange', jumpFromHash);
</script>
